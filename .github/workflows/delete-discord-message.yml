name: Delete Discord Messages (All Configured Servers)

on:
  workflow_dispatch:
    inputs:
      message_ids:
        description: "Discord message IDs or links; separate multiple entries with commas, spaces, or new lines"
        required: true
        type: string

permissions:
  contents: read

jobs:
  delete:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Delete messages
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          MESSAGE_IDS: ${{ inputs.message_ids }}
        run: python tools/delete_discord_messages.py
