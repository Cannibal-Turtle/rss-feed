name: Update Novel Status Embeds

on:
  repository_dispatch:
    types: [update-novel-status]

  workflow_dispatch:
    inputs:
      short_code:
        description: "Novel short code (e.g. AMLWC)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  update_status:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "discord.py>=2.3" python-dateutil

      - name: Resolve payload
        run: |
          SHORT_CODE="${{ github.event.client_payload.short_code || github.event.inputs.short_code }}"
          TITLE="${{ github.event.client_payload.title }}"
          HOST="${{ github.event.client_payload.host }}"

          if [ -z "$SHORT_CODE" ] && { [ -z "$TITLE" ] || [ -z "$HOST" ]; }; then
            echo "❌ Missing short_code, or title + host"
            exit 1
          fi

          echo "SHORT_CODE=$SHORT_CODE" >> $GITHUB_ENV
          echo "TITLE=$TITLE" >> $GITHUB_ENV
          echo "HOST=$HOST" >> $GITHUB_ENV
          echo "SOURCE=${{ github.event.client_payload.source || 'manual' }}" >> $GITHUB_ENV

          if [ -n "$SHORT_CODE" ]; then
            echo "🔔 Updating novel card for $SHORT_CODE"
          else
            echo "🔔 Updating novel card for $TITLE ($HOST)"
          fi

      - name: Run updater
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: |
          if [ -n "$SHORT_CODE" ]; then
            python tools/update_novel_card.py "$SHORT_CODE"
          else
            python tools/update_novel_card.py "$TITLE" "$HOST"
          fi
