name: Publish Membership Update

on:
  workflow_dispatch:
    inputs:
      short_code:
        description: "Novel short code, e.g. TVITPA, TDLBKGC, ATVHE"
        required: true
        type: string
      banner_url:
        description: "Optional banner image URL. Leave empty to auto-crop the novel featured_image."
        required: false
        type: string
      banner_ratio:
        description: "Optional ratio, e.g. 8:3 or 4:1; use original for no crop/resize. Blank uses message_templates TOML."
        required: false
        type: string
      crop_position:
        description: "Crop position used only when banner_url is empty. Default is auto subject-aware cropping with upper-center fallback."
        required: true
        default: auto
        type: choice
        options:
          - auto
          - top
          - upper
          - upper center
          - center
          - lower center
          - lower
          - bottom
      mode:
        description: "What do you want to do?"
        required: true
        default: crop preview
        type: choice
        options:
          - crop preview
          - preview
          - publish

permissions:
  contents: write

concurrency:
  group: publish-membership-update
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Cache announcement subject model
        uses: actions/cache@v5
        with:
          path: ~/.cache/cannibal-turtle/announcement-banner
          key: announcement-yoloe-11s-seg-pf-v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -r requirements.txt

      - name: Resolve arguments
        run: |
          echo "SHORT_CODE=${{ github.event.inputs.short_code }}" >> $GITHUB_ENV
          echo "BANNER_URL=${{ github.event.inputs.banner_url }}" >> $GITHUB_ENV
          echo "BANNER_RATIO=${{ github.event.inputs.banner_ratio }}" >> $GITHUB_ENV
          echo "CROP_POSITION=${{ github.event.inputs.crop_position }}" >> $GITHUB_ENV
          echo "MODE=${{ github.event.inputs.mode }}" >> $GITHUB_ENV
          echo "MEMBERSHIP_BANNER_OUTPUT=banner.png" >> $GITHUB_ENV

      - name: Run membership update tool
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: |
          python tools/publish_membership_update.py "$SHORT_CODE" "$BANNER_URL" "$MODE" "$CROP_POSITION" "$BANNER_RATIO"

      - name: Upload cropped banner preview
        if: ${{ env.MODE == 'crop preview' }}
        uses: actions/upload-artifact@v6
        with:
          name: banner-preview-${{ env.SHORT_CODE }}
          path: |
            banner.png
            auto.png
            top.png
            upper.png
            upper_center.png
            center.png
            lower_center.png
            lower.png
            bottom.png
            contact_sheet.png
          if-no-files-found: error
          retention-days: 1

      - name: Commit updated novel TOML
        if: ${{ env.MODE == 'publish' }}
        run: |
          git pull --rebase --autostash
          git add mappings/novels/*.toml

          if git diff --cached --quiet; then
            echo "No mapping changes to commit."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "ci: mark $SHORT_CODE as membership novel"
          git push
