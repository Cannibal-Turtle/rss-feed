name: Publish Membership Update

on:
  workflow_dispatch:
    inputs:
      short_code:
        description: "Novel short code, e.g. TVITPA, TDLBKGC, ATVHE"
        required: true
        type: string
      banner_url:
        description: "Membership banner image URL"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: publish-membership-update
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests>=2.31

      - name: Resolve arguments
        run: |
          echo "SHORT_CODE=${{ github.event.inputs.short_code }}" >> $GITHUB_ENV
          echo "BANNER_URL=${{ github.event.inputs.banner_url }}" >> $GITHUB_ENV

      - name: Publish membership update
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: |
          python tools/publish_membership_update.py "$SHORT_CODE" "$BANNER_URL"

      - name: Commit updated novel_mappings.py
        run: |
          git pull --rebase --autostash
          git add novel_mappings.py

          if git diff --cached --quiet; then
            echo "No mapping changes to commit."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "ci: mark $SHORT_CODE as membership novel"
          git push
