name: Publish Membership Update

on:
  workflow_dispatch:
    inputs:
      short_code:
        description: "Novel short code, e.g. TVITPA, TDLBKGC, ATVHE"
        required: true
        type: string
      banner_url:
        description: "Optional banner image URL. Leave empty to auto-crop the novel featured_image to 4:1."
        required: false
        type: string
      crop_position:
        description: "Crop position used only when banner_url is empty."
        required: true
        default: upper
        type: choice
        options:
          - top
          - upper
          - center
          - lower
          - bottom
      mode:
        description: "What do you want to do?"
        required: true
        default: crop preview
        type: choice
        options:
          - crop preview
          - preview
          - publish

permissions:
  contents: write

concurrency:
  group: publish-membership-update
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Resolve arguments
        run: |
          echo "SHORT_CODE=${{ github.event.inputs.short_code }}" >> $GITHUB_ENV
          echo "BANNER_URL=${{ github.event.inputs.banner_url }}" >> $GITHUB_ENV
          echo "CROP_POSITION=${{ github.event.inputs.crop_position }}" >> $GITHUB_ENV
          echo "MODE=${{ github.event.inputs.mode }}" >> $GITHUB_ENV
          echo "MEMBERSHIP_BANNER_OUTPUT=membership_banner.png" >> $GITHUB_ENV

      - name: Run membership update tool
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: |
          python tools/publish_membership_update.py "$SHORT_CODE" "$BANNER_URL" "$MODE" "$CROP_POSITION"

      - name: Upload cropped banner preview
        if: ${{ env.MODE == 'crop preview' }}
        uses: actions/upload-artifact@v4
        with:
          name: membership-banner-preview-${{ env.SHORT_CODE }}
          path: |
            membership_banner.png
            membership_banner_*.png
          if-no-files-found: error
          retention-days: 1

      - name: Commit updated novel TOML
        if: ${{ env.MODE == 'publish' }}
        run: |
          git pull --rebase --autostash
          git add mappings/novels/*.toml

          if git diff --cached --quiet; then
            echo "No mapping changes to commit."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "ci: mark $SHORT_CODE as membership novel"
          git push
