name: Healthcheck

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [ main ]
    paths:
      - "config/**"
      - "mappings/**"
      - "message_templates/**"
      - "feed_api/**"
      - "host_utils/**"
      - "novelupdates/**"
      - "revenue/**"
      - "token/**"
      - "tools/**"
      - "*.py"
      - "requirements.txt"
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  healthcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Healthcheck
        run: python tools/healthcheck.py --snapshot

      - name: Upload Diagnostics Snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics
          path: snapshots/diagnostics.json
          if-no-files-found: ignore
