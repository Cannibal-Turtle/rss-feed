name: Update Paid Feed

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      force_downstream:
        description: "Force trigger downstream repos even if no new feed GUIDs were added"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

env:
  FORCE_DOWNSTREAM: "false"  # emergency YAML fallback; prefer config/integrations.json → downstream_dispatch.force

# Match the free job so only one feed job pushes at a time
concurrency:
  group: feeds-main
  cancel-in-progress: false

jobs:
  update_paid_feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false   # we'll set the remote with the token

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Snapshot current paid feed GUIDs
        run: python feed_guid_gate.py snapshot paid_chapters_feed.xml /tmp/paid_guids_before.txt

      - name: Run Paid Feed Generator
        run: python paid_feed_generator.py

      - name: Detect new paid feed items
        id: feed_changes
        run: python feed_guid_gate.py detect paid_chapters_feed.xml /tmp/paid_guids_before.txt

      - name: Send feed_api alert if enabled
        if: steps.feed_changes.outputs.new_items == 'true'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: python feed_api/send_feed_api_alert.py paid

      - name: Commit and Push Changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          git add paid_chapters_feed.xml

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "ci: update paid feed"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git

          for attempt in 1 2 3; do
            echo "Push attempt $attempt..."

            git fetch origin main:refs/remotes/origin/main

            if ! git rebase origin/main; then
              echo "Rebase failed. Aborting."
              git rebase --abort || true
              exit 1
            fi

            if git push origin HEAD:main; then
              echo "Push succeeded."
              exit 0
            fi

            echo "Push failed, probably because main moved. Retrying..."
            sleep 3
          done

          echo "Push failed after 3 attempts."
          exit 1

      - name: Trigger Discord Webhook Workflow if needed
        env:
          PAT_GITHUB: ${{ secrets.PAT_GITHUB }}
          NEW_ITEMS: ${{ steps.feed_changes.outputs.new_items }}
          MANUAL_FORCE_DOWNSTREAM: ${{ inputs.force_downstream == true && 'true' || 'false' }}
        run: |
          set -euo pipefail

          DOWNSTREAM_REPOS=$(python - <<'PY'
          from config_loader import get_downstream_repos
          print(" ".join(get_downstream_repos()))
          PY
          )

          DISPATCH_EVENT=$(python - <<'PY'
          from config_loader import get_dispatch_event
          print(get_dispatch_event("chapters", "trigger-discord-notify"))
          PY
          )

          CONFIG_FORCE_DOWNSTREAM=$(python - <<'PY'
          from config_loader import should_force_downstream
          print("true" if should_force_downstream("paid") else "false")
          PY
          )

          RSS_FEED_REF=$(git rev-parse HEAD)

          echo "NEW_ITEMS=$NEW_ITEMS"
          echo "FORCE_DOWNSTREAM=$FORCE_DOWNSTREAM"
          echo "MANUAL_FORCE_DOWNSTREAM=$MANUAL_FORCE_DOWNSTREAM"
          echo "CONFIG_FORCE_DOWNSTREAM=$CONFIG_FORCE_DOWNSTREAM"
          echo "DOWNSTREAM_REPOS=$DOWNSTREAM_REPOS"
          echo "DISPATCH_EVENT=$DISPATCH_EVENT"
          echo "RSS_FEED_REF=$RSS_FEED_REF"

          if [ "$NEW_ITEMS" != "true" ] && [ "$FORCE_DOWNSTREAM" != "true" ] && [ "$MANUAL_FORCE_DOWNSTREAM" != "true" ] && [ "$CONFIG_FORCE_DOWNSTREAM" != "true" ]; then
            echo "No new paid feed GUIDs and downstream force is false. Skipping downstream trigger."
            exit 0
          fi

          if [ -z "$DOWNSTREAM_REPOS" ]; then
            echo "No downstream repos configured. Skipping downstream trigger."
            exit 0
          fi

          for REPO in $DOWNSTREAM_REPOS; do
            echo "Dispatching paid workflow to $REPO..."
            curl -sS --fail-with-body \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $PAT_GITHUB" \
              "https://api.github.com/repos/$REPO/dispatches" \
              -d "{\"event_type\":\"$DISPATCH_EVENT\",\"client_payload\":{\"feed\":\"paid\",\"rss_repo\":\"${{ github.repository }}\",\"rss_ref\":\"$RSS_FEED_REF\"}}"
            echo
          done