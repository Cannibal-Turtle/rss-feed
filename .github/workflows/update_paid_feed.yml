name: Update Paid Feed

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

env:
  FORCE_DOWNSTREAM: "false"  # change to "true" to force both cron + manual runs for downstream workflows (discord-webhook, mistmint-discord) even if no new feed GUIDs were added
  DOWNSTREAM_REPOS: >-
    Cannibal-Turtle/discord-webhook
    Cannibal-Turtle/mistmint-discord

# Match the free job so only one feed job pushes at a time
concurrency:
  group: feeds-main
  cancel-in-progress: false

jobs:
  update_paid_feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false   # we'll set the remote with the token

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Snapshot current paid feed GUIDs
        run: python feed_guid_gate.py snapshot paid_chapters_feed.xml /tmp/paid_guids_before.txt

      - name: Run Paid Feed Generator
        env:
          MISTMINT_COOKIE: ${{ secrets.MISTMINT_COOKIE }}
        run: python paid_feed_generator.py

      - name: Detect new paid feed items
        id: feed_changes
        run: python feed_guid_gate.py detect paid_chapters_feed.xml /tmp/paid_guids_before.txt

      - name: Commit and Push Changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
      
          # One-time cleanup in case old root paths were tracked before (harmless if absent)
          git rm --cached mistmint_state.json paid_history.json 2>/dev/null || true
      
          # Always stage the generated feed
          git add paid_chapters_feed.xml
      
          # Only stage manual state/history when STATE mode is ON
          if [ "${MISTMINT_FORCE_STATE:-0}" = "1" ]; then
            [ -f rss-feed/manual_scripts/mistmint_state.json ] && git add rss-feed/manual_scripts/mistmint_state.json || true
            [ -f rss-feed/manual_scripts/paid_history.json ]   && git add rss-feed/manual_scripts/paid_history.json   || true
          fi
      
          # Commit only if something is staged
          if git diff --quiet --staged; then
            echo "No changes to commit."
            exit 0
          fi
      
          git commit -m "ci: update paid feed"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git fetch origin main
          git rebase origin/main || git pull --rebase origin main
          git push --force-with-lease origin HEAD:main

      - name: Trigger Discord Webhook Workflow if needed
        env:
          PAT_GITHUB: ${{ secrets.PAT_GITHUB }}
          NEW_ITEMS: ${{ steps.feed_changes.outputs.new_items }}
        run: |
          set -euo pipefail

          echo "NEW_ITEMS=$NEW_ITEMS"
          echo "FORCE_DOWNSTREAM=$FORCE_DOWNSTREAM"
          echo "DOWNSTREAM_REPOS=$DOWNSTREAM_REPOS"

          if [ "$NEW_ITEMS" != "true" ] && [ "$FORCE_DOWNSTREAM" != "true" ]; then
            echo "No new paid feed GUIDs and FORCE_DOWNSTREAM=false. Skipping downstream trigger."
            exit 0
          fi

          sleep 10

          for REPO in $DOWNSTREAM_REPOS; do
            echo "Dispatching paid workflow to $REPO..."
            curl -sS --fail-with-body \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $PAT_GITHUB" \
              "https://api.github.com/repos/$REPO/dispatches" \
              -d '{"event_type":"trigger-discord-notify","client_payload":{"feed":"paid"}}'
            echo
          done