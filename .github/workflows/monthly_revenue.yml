name: Monthly Revenue Report

on:
  schedule:
    # Runs around 6:30 PM Malaysia time on the last day of every month.
    # Cron has no simple "last day of month", so this checks days 28-31,
    # then the guard step below only allows the real last-day evening run to continue.
    - cron: "30 10 28-31 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monthly-revenue:
    runs-on: ubuntu-latest

    steps:
      - name: Check end of month
        id: endmonth
        run: |
          LOCAL_DAY="$(TZ=Asia/Kuala_Lumpur date +%d)"
          LOCAL_HOUR="$(TZ=Asia/Kuala_Lumpur date +%H)"
          TOMORROW_DAY="$(TZ=Asia/Kuala_Lumpur date -d tomorrow +%d)"

          echo "Malaysia local day=$LOCAL_DAY hour=$LOCAL_HOUR tomorrow_day=$TOMORROW_DAY"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Manual run: continuing."
          elif [ "$TOMORROW_DAY" = "01" ] && [ "$LOCAL_HOUR" -ge 18 ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Last day of month evening in Malaysia: continuing."
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Not the intended last-day evening revenue window in Malaysia: skipping."
          fi

      - name: Checkout repo
        if: steps.endmonth.outputs.should_run == 'true'
        uses: actions/checkout@v5

      - name: Set up Python
        if: steps.endmonth.outputs.should_run == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.endmonth.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run monthly revenue report
        if: steps.endmonth.outputs.should_run == 'true'
        env:
          MISTMINT_COOKIE: ${{ secrets.MISTMINT_COOKIE }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: |
          python revenue/report.py

      - name: Commit revenue state
        if: steps.endmonth.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add revenue/state.json

          if git diff --cached --quiet; then
            echo "No revenue state changes to commit."
          else
            git commit -m "Update monthly revenue state"
            git pull --rebase --autostash
            git push
          fi
