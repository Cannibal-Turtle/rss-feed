name: Update Free Feed

on:
  schedule:
    - cron: '0 5 * * *'    # 13:00 MYT
  workflow_dispatch:
    inputs:
      force_downstream:
        description: "Force trigger downstream repos even if no new feed GUIDs were added"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

env:
  FORCE_DOWNSTREAM: "false"  # change to "true" to force both cron + manual runs for downstream workflows (discord-webhook, mistmint-discord) even if no new feed GUIDs were added

# Match the paid job so only one feed job pushes at a time
concurrency:
  group: feeds-main
  cancel-in-progress: false

jobs:
  update_feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false   # we'll set the remote URL with token manually

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Snapshot current free feed GUIDs
        run: python feed_guid_gate.py snapshot free_chapters_feed.xml /tmp/free_guids_before.txt

      - name: Run Feed Generator
        run: python free_feed_generator.py

      - name: Detect new free feed items
        id: feed_changes
        run: python feed_guid_gate.py detect free_chapters_feed.xml /tmp/free_guids_before.txt

      - name: Commit and Push Changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          git add free_chapters_feed.xml || true
          git commit -m "ci: update free feed XML" || echo "No changes to commit"

          # Use tokenized remote and rebase onto the latest main
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git fetch origin main
          git rebase origin/main || git pull --rebase origin main

          # Safe force so bot overwrites only its own last commit
          git push --force-with-lease origin HEAD:main

      - name: Trigger Discord Webhook Workflow if needed
        env:
          PAT_GITHUB: ${{ secrets.PAT_GITHUB }}
          NEW_ITEMS: ${{ steps.feed_changes.outputs.new_items }}
          MANUAL_FORCE_DOWNSTREAM: ${{ inputs.force_downstream == true && 'true' || 'false' }}
        run: |
          set -euo pipefail

          DOWNSTREAM_REPOS=$(python - <<'PY'
          from config_loader import get_downstream_repos
          print(" ".join(get_downstream_repos()))
          PY
          )

          DISPATCH_EVENT=$(python - <<'PY'
          from config_loader import get_dispatch_event
          print(get_dispatch_event("chapters", "trigger-discord-notify"))
          PY
          )

          echo "NEW_ITEMS=$NEW_ITEMS"
          echo "FORCE_DOWNSTREAM=$FORCE_DOWNSTREAM"
          echo "MANUAL_FORCE_DOWNSTREAM=$MANUAL_FORCE_DOWNSTREAM"
          echo "DOWNSTREAM_REPOS=$DOWNSTREAM_REPOS"
          echo "DISPATCH_EVENT=$DISPATCH_EVENT"

          if [ "$NEW_ITEMS" != "true" ] && [ "$FORCE_DOWNSTREAM" != "true" ] && [ "$MANUAL_FORCE_DOWNSTREAM" != "true" ]; then
            echo "No new free feed GUIDs and downstream force is false. Skipping downstream trigger."
            exit 0
          fi

          if [ -z "$DOWNSTREAM_REPOS" ]; then
            echo "No downstream repos configured. Skipping downstream trigger."
            exit 0
          fi

          for REPO in $DOWNSTREAM_REPOS; do
            echo "Dispatching free workflow to $REPO..."
            curl -sS --fail-with-body \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $PAT_GITHUB" \
              "https://api.github.com/repos/$REPO/dispatches" \
              -d "{\"event_type\":\"$DISPATCH_EVENT\",\"client_payload\":{\"feed\":\"free\"}}"
            echo
          done

