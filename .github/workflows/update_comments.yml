name: Update Comments Feed

on:
  schedule:
    - cron: '55 14 * * *'    # 22:55 MYT
  workflow_dispatch:
    inputs:
      force_downstream:
        description: "Force trigger downstream repos even if no new feed GUIDs were added"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

env:
  FORCE_DOWNSTREAM: "false"  # emergency YAML fallback; prefer config/integrations.json → downstream_dispatch.force
    
concurrency:
  group: comments-feed
  cancel-in-progress: false

jobs:
  update_comments:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false
          
      - name: Seed token alert state if missing
        run: |
          mkdir -p token
          [ -f token/token_alert_state.json ] || echo '{}' > token/token_alert_state.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Snapshot current comments feed GUIDs
        run: python feed_guid_gate.py snapshot aggregated_comments_feed.xml /tmp/comments_guids_before.txt

      - name: Run Comments Feed Generator (also checks token)
        env:
          # needed by comments.py for repo dispatch
          GITHUB_TOKEN:      ${{ github.token }} 
          GITHUB_REPOSITORY: ${{ github.repository }}
          MISTMINT_COOKIE:   ${{ secrets.MISTMINT_COOKIE }}
        run: python comments.py

      - name: Merge NovelUpdates comments (post-merge)
        env:
          GITHUB_TOKEN:      ${{ github.token }} 
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python -m host_utils.host_nu_comments --merge aggregated_comments_feed.xml

      - name: Detect new comments feed items
        id: feed_changes
        run: python feed_guid_gate.py detect aggregated_comments_feed.xml /tmp/comments_guids_before.txt

      - name: Commit and Push Changes (feed + token state)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git

          git add aggregated_comments_feed.xml token/token_alert_state.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update Comments Feed + token state"

          for attempt in 1 2 3; do
            echo "Push attempt $attempt..."

            git fetch origin main:refs/remotes/origin/main

            if ! git rebase origin/main; then
              echo "Rebase failed. Aborting."
              git rebase --abort || true
              exit 1
            fi

            if git push origin HEAD:main; then
              echo "Push succeeded."
              exit 0
            fi

            echo "Push failed, probably because main moved. Retrying..."
            sleep 3
          done

          echo "Push failed after 3 attempts."
          exit 1

      - name: Trigger Discord Bot Workflows if needed
        env:
          PAT_GITHUB: ${{ secrets.PAT_GITHUB }}
          NEW_ITEMS: ${{ steps.feed_changes.outputs.new_items }}
          MANUAL_FORCE_DOWNSTREAM: ${{ inputs.force_downstream == true && 'true' || 'false' }}
        run: |
          set -euo pipefail

          DOWNSTREAM_REPOS=$(python - <<'PY'
          from config_loader import get_downstream_repos
          print(" ".join(get_downstream_repos()))
          PY
          )

          DISPATCH_EVENT=$(python - <<'PY'
          from config_loader import get_dispatch_event
          print(get_dispatch_event("comments", "trigger-discord-comments"))
          PY
          )

          CONFIG_FORCE_DOWNSTREAM=$(python - <<'PY'
          from config_loader import should_force_downstream
          print("true" if should_force_downstream("comments") else "false")
          PY
          )

          RSS_FEED_REF=$(git rev-parse HEAD)

          echo "NEW_ITEMS=$NEW_ITEMS"
          echo "FORCE_DOWNSTREAM=$FORCE_DOWNSTREAM"
          echo "MANUAL_FORCE_DOWNSTREAM=$MANUAL_FORCE_DOWNSTREAM"
          echo "CONFIG_FORCE_DOWNSTREAM=$CONFIG_FORCE_DOWNSTREAM"
          echo "DOWNSTREAM_REPOS=$DOWNSTREAM_REPOS"
          echo "DISPATCH_EVENT=$DISPATCH_EVENT"
          echo "RSS_FEED_REF=$RSS_FEED_REF"

          if [ "$NEW_ITEMS" != "true" ] && [ "$FORCE_DOWNSTREAM" != "true" ] && [ "$MANUAL_FORCE_DOWNSTREAM" != "true" ] && [ "$CONFIG_FORCE_DOWNSTREAM" != "true" ]; then
            echo "No new comments feed GUIDs and downstream force is false. Skipping downstream trigger."
            exit 0
          fi

          if [ -z "$DOWNSTREAM_REPOS" ]; then
            echo "No downstream repos configured. Skipping downstream trigger."
            exit 0
          fi
          
          for REPO in $DOWNSTREAM_REPOS; do
            echo "Dispatching comments workflow to $REPO..."
            curl -sS --fail-with-body \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $PAT_GITHUB" \
              "https://api.github.com/repos/$REPO/dispatches" \
              -d "{\"event_type\":\"$DISPATCH_EVENT\",\"client_payload\":{\"rss_repo\":\"${{ github.repository }}\",\"rss_ref\":\"$RSS_FEED_REF\"}}"
            echo
          done
