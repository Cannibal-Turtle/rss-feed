name: Update Comments Feed

on:
  schedule:
    - cron: '55 14 * * *'    # 22:55 MYT
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_DOWNSTREAM: "false"  # change to "true" to force both cron + manual comments triggers for downstream workflows (discord-webhook, mistmint-discord) even if no new feed GUIDs were added
  DOWNSTREAM_REPOS: >-
    Cannibal-Turtle/discord-webhook
    Cannibal-Turtle/mistmint-discord
    
concurrency:
  group: comments-feed
  cancel-in-progress: false

jobs:
  update_comments:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false
          
      - name: Seed token alert state if missing
        run: |
          mkdir -p token
          [ -f token/token_alert_state.json ] || echo '{}' > token/token_alert_state.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Snapshot current comments feed GUIDs
        run: python feed_guid_gate.py snapshot aggregated_comments_feed.xml /tmp/comments_guids_before.txt

      - name: Run Comments Feed Generator (also checks token)
        env:
          # needed by comments.py for repo dispatch
          GITHUB_TOKEN:      ${{ github.token }} 
          GITHUB_REPOSITORY: ${{ github.repository }}
          MISTMINT_COOKIE:   ${{ secrets.MISTMINT_COOKIE }}
        run: python comments.py

      - name: Merge NovelUpdates comments (post-merge)
        env:
          GITHUB_TOKEN:      ${{ github.token }} 
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python -m host_utils.host_nu_comments --merge aggregated_comments_feed.xml

      - name: Detect new comments feed items
        id: feed_changes
        run: python feed_guid_gate.py detect aggregated_comments_feed.xml /tmp/comments_guids_before.txt

      - name: Commit and Push Changes (feed + token state)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git add aggregated_comments_feed.xml token/token_alert_state.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Comments Feed + token state"
            git pull --rebase --autostash
            git push
          fi

      - name: Trigger Discord Bot Workflows if needed
        env:
          PAT_GITHUB: ${{ secrets.PAT_GITHUB }}
          NEW_ITEMS: ${{ steps.feed_changes.outputs.new_items }}
        run: |
          set -euo pipefail

          echo "NEW_ITEMS=$NEW_ITEMS"
          echo "FORCE_DOWNSTREAM=$FORCE_DOWNSTREAM"
          echo "DOWNSTREAM_REPOS=$DOWNSTREAM_REPOS"

          if [ "$NEW_ITEMS" != "true" ] && [ "$FORCE_DOWNSTREAM" != "true" ]; then
            echo "No new comments feed GUIDs and FORCE_DOWNSTREAM=false. Skipping downstream trigger."
            exit 0
          fi

          sleep 10

          for REPO in $DOWNSTREAM_REPOS; do
            echo "Dispatching comments workflow to $REPO..."
            curl -sS --fail-with-body -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $PAT_GITHUB" \
              "https://api.github.com/repos/$REPO/dispatches" \
              -d '{"event_type":"trigger-discord-comments"}'
            echo
          done
