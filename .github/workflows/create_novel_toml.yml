name: Create Novel TOML

on:
  workflow_dispatch:
    inputs:
      host:
        description: "Hosting site, e.g. Mistmint Haven"
        required: true
        default: "Mistmint Haven"
        type: string
      title:
        description: "Novel title exactly/as shown in host dashboard"
        required: true
        type: string
      short_code:
        description: "Novel short code, e.g. AMLWC"
        required: true
        type: string
      chapter_count:
        description: "Chapter count optional, e.g. 93 Chapters. Leave blank to write an empty string."
        required: false
        type: string
      last_chapter:
        description: "Last chapter optional, e.g. Chapter 93. Leave blank to write an empty string."
        required: false
        type: string
      discord_color:
        description: "Discord color optional, e.g. #c90016. Leave blank to write an empty string."
        required: false
        type: string
      quick_transmigration:
        description: "Classify it as quick transmigration"
        required: false
        default: false
        type: boolean
      infinite_flow:
        description: "Classify it as infinite flow"
        required: false
        default: false
        type: boolean
      has_arcs:
        description: "Create arc_history/<short_code>_history.json and set history_file"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      dry_run:
        description: "Preview TOML without committing"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      overwrite:
        description: "Allow replacing an existing novel TOML or downstream novel mapping"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      personal_role_id:
        description: "--- INTEGRATIONS --- Personal server's Discord novel role ID (optional)"
        required: false
        type: string
      personal_custom_emoji:
        description: "Personal server's Discord custom emoji, e.g. <:name:123> (optional)"
        required: false
        type: string
      personal_role_url:
        description: "Personal server's Discord role URL. Leave blank to reuse the latest URL in that server's novel map."
        required: false
        type: string
      host_role_id:
        description: "Host server's Discord novel role ID (optional)"
        required: false
        type: string
      host_custom_emoji:
        description: "Host server's Discord custom emoji, e.g. <:name:123> (optional)"
        required: false
        type: string
      host_role_url:
        description: "Host server's Discord role URL. Leave blank to reuse the latest URL in that host server's novel map."
        required: false
        type: string
      host_destination_id:
        description: "Per-novel host Discord thread/channel ID. Leave blank for shared-channel hosts."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: create-novel-toml
  cancel-in-progress: false

jobs:
  create:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create novel TOML
        env:
          MISTMINT_COOKIE: ${{ secrets.MISTMINT_COOKIE }}
          MISTMINT_TOKEN: ${{ secrets.MISTMINT_TOKEN }}
        run: |
          ARGS=(
            --host "${{ github.event.inputs.host }}"
            --title "${{ github.event.inputs.title }}"
            --short-code "${{ github.event.inputs.short_code }}"
            --chapter-count "${{ github.event.inputs.chapter_count }}"
            --last-chapter "${{ github.event.inputs.last_chapter }}"
            --discord-color "${{ github.event.inputs.discord_color }}"
            --quick-transmigration "${{ github.event.inputs.quick_transmigration }}"
            --infinite-flow "${{ github.event.inputs.infinite_flow }}"
            --has-arcs "${{ github.event.inputs.has_arcs }}"
          )

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS+=(--dry-run)
          fi

          if [ "${{ github.event.inputs.overwrite }}" = "true" ]; then
            ARGS+=(--overwrite)
          fi

          python tools/create_novel_toml.py "${ARGS[@]}"

      - name: Update related Discord configs
        env:
          PAT_GITHUB: ${{ secrets.PAT_GITHUB }}
        run: |
          ARGS=(
            --host "${{ github.event.inputs.host }}"
            --short-code "${{ github.event.inputs.short_code }}"
            --personal-role-id "${{ github.event.inputs.personal_role_id }}"
            --personal-custom-emoji "${{ github.event.inputs.personal_custom_emoji }}"
            --personal-role-url "${{ github.event.inputs.personal_role_url }}"
            --host-role-id "${{ github.event.inputs.host_role_id }}"
            --host-custom-emoji "${{ github.event.inputs.host_custom_emoji }}"
            --host-role-url "${{ github.event.inputs.host_role_url }}"
            --host-destination-id "${{ github.event.inputs.host_destination_id }}"
          )

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS+=(--dry-run)
          fi

          if [ "${{ github.event.inputs.overwrite }}" = "true" ]; then
            ARGS+=(--overwrite)
          fi

          python tools/update_novel_integrations.py "${ARGS[@]}"

      - name: Commit generated files
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git pull --rebase --autostash
          git add mappings/novels/*.toml
          if [ -d arc_history ]; then
            git add arc_history/*.json || true
          fi

          if git diff --cached --quiet; then
            echo "No mapping changes to commit."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "ci: add ${{ github.event.inputs.short_code }} novel mapping"
          git push
