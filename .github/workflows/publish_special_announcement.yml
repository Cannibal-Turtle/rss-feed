name: Publish Special Announcement

on:
  workflow_dispatch:
    inputs:
      short_code:
        description: "Novel short code, e.g. AMLWC, TDLBKGC, HIAFLG"
        required: true
        type: string
      banner_url:
        description: "Optional banner image URL. Leave empty to auto-crop the novel featured_image to 4:1."
        required: false
        type: string
      blur_banner:
        description: "Blur/spoiler the banner image? NSFW novel banners are auto-blurred even if unchecked."
        required: false
        default: false
        type: boolean
      blur_card:
        description: "Blur/spoiler the whole announcement card?"
        required: false
        default: false
        type: boolean
      crop_position:
        description: "Crop position used only when banner_url is empty. Default is upper center."
        required: true
        default: upper center
        type: choice
        options:
          - top
          - upper
          - upper center
          - center
          - lower center
          - lower
          - bottom
      mode:
        description: "What do you want to do?"
        required: true
        default: crop preview
        type: choice
        options:
          - crop preview
          - preview
          - publish

permissions:
  contents: read

concurrency:
  group: publish-special-announcement
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Resolve arguments
        run: |
          echo "SHORT_CODE=${{ github.event.inputs.short_code }}" >> $GITHUB_ENV
          echo "BANNER_URL=${{ github.event.inputs.banner_url }}" >> $GITHUB_ENV
          echo "SPECIAL_ANNOUNCEMENT_BLUR_BANNER=${{ github.event.inputs.blur_banner }}" >> $GITHUB_ENV
          echo "SPECIAL_ANNOUNCEMENT_BLUR_CARD=${{ github.event.inputs.blur_card }}" >> $GITHUB_ENV
          echo "CROP_POSITION=${{ github.event.inputs.crop_position }}" >> $GITHUB_ENV
          echo "MODE=${{ github.event.inputs.mode }}" >> $GITHUB_ENV
          echo "SPECIAL_ANNOUNCEMENT_BANNER_OUTPUT=special_announcement_banner.png" >> $GITHUB_ENV

      - name: Run special announcement tool
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: |
          python tools/publish_special_announcement.py "$SHORT_CODE" "$BANNER_URL" "$MODE" "$CROP_POSITION"

      - name: Upload cropped banner preview
        if: ${{ env.MODE == 'crop preview' }}
        uses: actions/upload-artifact@v6
        with:
          name: special-announcement-banner-preview-${{ env.SHORT_CODE }}
          path: |
            special_announcement_banner.png
            special_announcement_banner_*.png
          if-no-files-found: error
          retention-days: 1
